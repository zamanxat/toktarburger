<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#13151c"/>
<title>Контент и настройки — TokBurger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Noto+Sans:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="prefetch" href="index.html"/>
<style>
/* Montserrat + Noto: толық кирилл; Unbounded — тек TOKBURGER бренді */
:root{
  --font-ui:'Montserrat','Noto Sans',system-ui,sans-serif;
  --font-brand:'Unbounded',var(--font-ui),sans-serif;
  --y:#FF5300;--yd:#e64a00;--y-glow:rgba(255,83,0,.2);
  --dk:#12141c;--dk2:#1a1d28;--dk3:#222635;
  --wh:#fff;--bg:#f4f6fb;--card:#fff;
  --grn:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --bdr:#e2e6f0;--mut:#5c6477;
  --r:14px;--sh:0 8px 28px rgba(15,23,42,.1);--shl:0 16px 40px rgba(15,23,42,.12);
  --r-lg:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:var(--font-ui);background:radial-gradient(120% 80% at 100% 0%,#eef2ff 0,#f4f6fb 40%,#f0f1f5 100%);min-height:100%;min-height:100dvh;color:var(--dk);overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);display:flex;flex-direction:column}
input,select,textarea{font-family:var(--font-ui);outline:none}
button{font-family:var(--font-ui);cursor:pointer;border:none;outline:none;background:none}

/* ── LOGIN SCREEN ──────────────────────────────────── */
#loginScreen{position:fixed;inset:0;background:var(--dk);display:flex;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:0;min-height:100dvh;min-height:-webkit-fill-available}
.login-box{background:linear-gradient(180deg,#262b3d 0%,#1d2131 100%);border-radius:22px;padding:36px 28px;width:min(360px,92vw);border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 48px rgba(0,0,0,.32)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.login-logo .ico-box{width:56px;height:56px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.login-logo .ico-box img{width:100%;height:100%;object-fit:contain}
.login-logo-txt{font-family:var(--font-brand);color:var(--y);font-size:16px;font-weight:800;letter-spacing:.3px}
.login-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r);color:#fff;font-size:15px;font-weight:600;margin-bottom:14px;transition:.2s}
.login-input:focus{border-color:var(--y)}
.login-input::placeholder{color:rgba(255,255,255,.3)}
.login-btn{width:100%;padding:14px 16px;background:var(--y);color:var(--dk);border-radius:var(--r);font-size:14px;font-weight:800;transition:.18s;margin-top:4px;min-height:48px}
.login-btn:hover{background:var(--yd)}
.login-btn:active{transform:scale(.97)}
.login-err{color:#f87171;font-size:13px;font-weight:700;text-align:center;margin-top:10px;min-height:18px}

/* ── ADMIN LAYOUT ─────────────────────────────────── */
#adminApp{display:none;flex:1;flex-direction:column;min-height:0;min-height:100dvh}
#adminApp.on{display:flex}

.adm-nb{min-height:56px;background:linear-gradient(100deg,#0f1118 0%,#1a1f2e 55%,#151823 100%);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:10px;flex-shrink:0;box-shadow:0 4px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04)}
.adm-nb-logo{display:flex;align-items:center;gap:9px}
.adm-nb-logo .ico-box{width:40px;height:40px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.adm-nb-logo .ico-box img{width:100%;height:100%;object-fit:contain}
.adm-nb-brand{font-family:var(--font-brand);color:var(--y);font-size:14px;font-weight:800;letter-spacing:.25px}
.adm-nb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.adm-tag{background:linear-gradient(135deg,rgba(255,193,7,.2),rgba(255,83,0,.12));color:#ffe6a8;font-size:10px;font-weight:800;padding:6px 12px;border-radius:999px;letter-spacing:.35px;border:1px solid rgba(255,193,7,.3);max-width:min(200px,46vw);line-height:1.2;text-align:center}
.adm-logout,.adm-close{color:rgba(255,255,255,.55);font-size:12.5px;font-weight:700;padding:10px 14px;min-height:40px;border-radius:12px;background:rgba(255,255,255,.07);transition:.2s;flex-shrink:0}
.adm-logout:hover,.adm-close:hover{color:#fff;background:rgba(255,255,255,.14)}

.adm-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* SIDEBAR */
.sidebar{width:236px;background:linear-gradient(180deg,#171a24,#1b1f2d 58%,#171a24);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;border-right:1px solid rgba(255,255,255,.06)}
.sidebar::-webkit-scrollbar{display:none}
.sb-nav{padding:12px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:12px 20px;min-height:44px;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;border-left:3px solid transparent;user-select:none}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.sb-item.on{color:#ffd24e;border-left-color:var(--y);background:linear-gradient(90deg,rgba(255,193,7,.14),rgba(255,193,7,.03))}
.sb-item svg{flex-shrink:0;opacity:.7}
.sb-item.on svg{opacity:1}
.sb-div{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.sb-back{margin:auto 0 0;border-top:1px solid rgba(255,255,255,.07);padding:14px 20px}
.sb-back a{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:12px;font-weight:700;text-decoration:none;transition:.2s}
.sb-back a:hover{color:rgba(255,255,255,.7)}

/* CONTENT */
.adm-content{flex:1;overflow-y:auto;padding:20px max(20px,env(safe-area-inset-left)) 28px max(20px,env(safe-area-inset-right));background:transparent;min-width:0}
.sec-ttl{font-family:var(--font-ui);font-size:18px;font-weight:800;margin-bottom:8px;color:var(--dk);display:flex;align-items:center;flex-wrap:wrap;gap:12px;padding:2px 4px 0;box-sizing:border-box}
.sec-ttl svg{flex-shrink:0;color:var(--y);filter:drop-shadow(0 0 8px var(--y-glow))}
.sec-hint{font-size:12.5px;line-height:1.45;color:var(--mut);max-width:48em;margin:0 0 16px;padding:11px 14px 12px;background:rgba(255,255,255,.88);border-radius:12px;border:1px solid var(--bdr);box-shadow:0 2px 12px rgba(15,23,42,.04)}
.sec-hint code{font-family:ui-monospace,'Cascadia Code',monospace;font-size:11.5px;font-weight:600;background:rgba(0,0,0,.05);padding:2px 6px;border-radius:5px;color:#1e3a5f}
.hint-sml{display:block;font-size:11px;font-weight:600;color:var(--mut);line-height:1.35;margin:5px 0 0;max-width:40em;opacity:.92}

/* TABLE */
.tbl-wrap{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh);margin-bottom:20px;border:1px solid #e4e9f2;overflow:hidden;max-width:100%;-webkit-overflow-scrolling:touch}
.tbl{width:100%;min-width:0;border-collapse:collapse;table-layout:fixed}
.tbl th{padding:11px 10px 11px 14px;text-align:left;font-family:var(--font-ui);font-size:9.5px;font-weight:800;color:var(--mut);letter-spacing:.3px;text-transform:uppercase;border-bottom:1px solid var(--bdr);background:#f7f9ff;white-space:nowrap;vertical-align:bottom}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:12px;font-weight:600;vertical-align:middle;color:#263042;min-width:0}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f9fbff}
.tbl-img{width:32px;height:32px;border-radius:8px;object-fit:cover;background:#f0ead8;display:block;flex-shrink:0}
.tbl-noimg{width:32px;height:32px;border-radius:8px;background:#f0ead8;display:flex;align-items:center;justify-content:center;color:rgba(140,120,80,.4)}
/* бір қатар: бағаналар % — скролл жоқ */
.tbl-compact th:nth-child(1),.tbl-compact td:nth-child(1){width:44px;padding-left:6px;padding-right:4px}
.tbl-compact th:nth-child(2),.tbl-compact td:nth-child(2){width:auto;min-width:0;overflow:hidden}
.tbl-compact th:nth-child(2) .tbl-nm,.tbl-compact td:nth-child(2) b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.tbl-compact th:nth-child(3),.tbl-compact td:nth-child(3){width:13%;white-space:nowrap}
.tbl-compact th:nth-child(4),.tbl-compact td:nth-child(4){width:10%;min-width:0;overflow:hidden}
.tbl-compact .badge-chip{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle;max-width:5.2em}
.tbl-compact th:nth-child(5),.tbl-compact td:nth-child(5){width:50px;padding-left:4px;padding-right:4px;text-align:center}
.tbl-compact th:nth-child(6),.tbl-compact td:nth-child(6){width:80px;padding-left:6px;padding-right:max(12px,env(safe-area-inset-right,0));text-align:right}
.tbl-cat2 th:nth-child(1),.tbl-cat2 td:nth-child(1){min-width:0;width:46%;padding-left:max(16px,env(safe-area-inset-left,0));padding-right:10px}
.tbl-cat2 td:nth-child(1) b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.tbl-cat2 th:nth-child(2),.tbl-cat2 td:nth-child(2){width:58px;min-width:50px;max-width:64px}
.tbl-cat2 th:nth-child(3),.tbl-cat2 td:nth-child(3){width:50px;min-width:46px;max-width:56px}
.tbl-cat2 th:nth-child(4),.tbl-cat2 td:nth-child(4){width:76px;min-width:70px;max-width:80px;padding-right:max(14px,env(safe-area-inset-right,0))}
.tbl-cat2 th{white-space:normal;overflow-wrap:anywhere;line-height:1.2}
.tbl-cat2 th:nth-child(2),.tbl-cat2 th:nth-child(3){min-width:50px;max-width:4.2rem;white-space:normal}
.tbl-cat2 td:nth-child(2),.tbl-cat2 td:nth-child(3){text-align:center}
.tbl-prod-x{overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;max-width:100%}
.tbl-prod{min-width:36rem;width:100%}
@media(max-width:900px){
  .tbl-prod{min-width:32rem}
}
@media(max-width:480px){
  .tbl-prod{min-width:30rem}
}
.tbl-prod th{white-space:nowrap;overflow-wrap:normal;word-break:normal;line-height:1.15;padding:9px 5px;vertical-align:bottom;font-size:8.5px;letter-spacing:.15px;text-align:center}
.tbl-prod th:nth-child(1){text-align:left;padding-left:10px}
.tbl-prod th:nth-child(2){text-align:left}
.tbl-prod th:nth-child(6){padding-right:10px}
.tbl-prod th:nth-child(1),.tbl-prod td:nth-child(1){width:48px;min-width:48px;max-width:52px;box-sizing:border-box}
.tbl-prod td:nth-child(1){padding-left:10px}
.tbl-prod th:nth-child(2),.tbl-prod td:nth-child(2){min-width:0}
.tbl-prod th:nth-child(3),.tbl-prod td:nth-child(3){width:5.2rem;min-width:4.2rem;white-space:nowrap}
.tbl-prod th:nth-child(4),.tbl-prod th:nth-child(5){white-space:nowrap}
.tbl-prod th:nth-child(4),.tbl-prod td:nth-child(4){width:3.2rem;min-width:2.7rem;max-width:3.4rem}
.tbl-prod td:nth-child(4){white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-prod th:nth-child(5),.tbl-prod td:nth-child(5){width:4.2rem;min-width:3.4rem;max-width:4.4rem;white-space:nowrap;padding:8px 3px;text-align:center}
.tbl-prod th:nth-child(6),.tbl-prod td:nth-child(6){width:72px;min-width:70px;max-width:78px;box-sizing:border-box}
/* Өнімдер: кең экран — бағаналарды бөлу, тақырып пен мазмұн үсттеспейді */
@media(min-width:901px){
  .adm-sec--prods .tbl-wrap.prod-grp{overflow:visible;max-width:100%}
  .adm-sec--prods .tbl-prod-x{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-x:contain;
    max-width:100%;
    padding:2px 4px 6px 2px;
    scroll-padding-inline:8px
  }
  .adm-sec--prods .tbl-prod{min-width:48rem;table-layout:fixed;width:100%}
  .adm-sec--prods .tbl-prod th{white-space:normal;word-wrap:break-word;overflow-wrap:anywhere;line-height:1.2;padding:10px 6px;vertical-align:bottom;font-size:8.5px;letter-spacing:.12px}
  .adm-sec--prods .tbl-prod th:nth-child(1),
  .adm-sec--prods .tbl-prod td:nth-child(1){width:56px;min-width:56px;max-width:64px;box-sizing:border-box}
  .adm-sec--prods .tbl-prod th:nth-child(1){text-align:left;padding-left:12px}
  .adm-sec--prods .tbl-prod td:nth-child(1){padding-left:12px;vertical-align:middle}
  .adm-sec--prods .tbl-prod th:nth-child(2),
  .adm-sec--prods .tbl-prod td:nth-child(2){
    min-width:0;width:32%;text-align:left
  }
  .adm-sec--prods .tbl-prod td:nth-child(2) .td-cell-val{min-width:0;overflow:hidden}
  .adm-sec--prods .tbl-prod td:nth-child(2) .tbl-nm{
    display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%
  }
  .adm-sec--prods .tbl-prod th:nth-child(2){text-align:left}
  .adm-sec--prods .tbl-prod th:nth-child(3),
  .adm-sec--prods .tbl-prod td:nth-child(3){
    width:11.5rem;min-width:10.5rem;max-width:16rem;white-space:nowrap;box-sizing:border-box;text-align:right;vertical-align:middle;overflow:visible
  }
  .adm-sec--prods .tbl-prod th:nth-child(3){text-align:right}
  .adm-sec--prods .tbl-prod td.tbl-price .td-cell-val{
    display:inline-flex;align-items:center;justify-content:flex-end;flex-wrap:nowrap;gap:6px;min-width:0;width:100%;
    white-space:nowrap
  }
  .adm-sec--prods .tbl-prod th:nth-child(4),
  .adm-sec--prods .tbl-prod td:nth-child(4){
    width:5.5rem;min-width:5.25rem;max-width:8rem;white-space:nowrap;text-align:center;vertical-align:middle;overflow:hidden;box-sizing:border-box
  }
  .adm-sec--prods .tbl-prod th:nth-child(5),
  .adm-sec--prods .tbl-prod td:nth-child(5){
    width:5.25rem;min-width:4.75rem;max-width:7.5rem;white-space:nowrap;padding:8px 6px;text-align:center;vertical-align:middle;box-sizing:border-box
  }
  .adm-sec--prods .tbl-prod th:nth-child(4),
  .adm-sec--prods .tbl-prod th:nth-child(5),
  .adm-sec--prods .tbl-prod th:nth-child(6){
    line-height:1.15;hyphens:none
  }
  .adm-sec--prods .tbl-prod th:nth-child(6),
  .adm-sec--prods .tbl-prod td:nth-child(6){
    width:90px;min-width:90px;max-width:100px;box-sizing:border-box;padding:8px 6px 8px 4px;vertical-align:middle
  }
  .adm-sec--prods .tbl-prod th:nth-child(6){padding-right:12px}
  .adm-sec--prods .tbl-prod td:nth-child(6) .act-btns{flex-shrink:0;justify-content:flex-end}
  .adm-sec--prods .tbl-prod .badge-chip{
    max-width:100%;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle
  }
}
/* Өнімдер: телефон/тар экран — кесте → карточка */
@media(max-width:900px){
  .adm-sec--prods .sec-ttl{gap:10px;align-items:flex-start}
  .adm-sec--prods .sec-ttl svg{flex-shrink:0;margin-top:2px}
  .adm-sec--prods .sec-hint{
    font-size:12px;line-height:1.55;padding:12px 14px;margin-bottom:0;
    border-left:3px solid rgba(255,193,7,.75);border-radius:0 12px 12px 0;
    background:linear-gradient(90deg,rgba(255,248,220,.5),rgba(255,255,255,.88));box-shadow:0 1px 0 rgba(15,23,42,.04)
  }
  .search-box.search-prods{
    flex-direction:column;align-items:stretch;gap:12px;
    padding:14px;
    background:linear-gradient(165deg,#f8f6ff 0%,#f0f2fa 50%,#eef0f6 100%);
    border:1px solid rgba(23,24,38,.1);border-radius:20px;
    box-shadow:0 4px 18px rgba(15,23,42,.07),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .search-box.search-prods .finp{
    width:100%;max-width:none;min-height:50px;flex:1 1 auto;
    border-radius:14px;border:1.5px solid #dfe3ee;background:#fff;
    font-size:15px;box-shadow:0 1px 3px rgba(15,23,42,.04)
  }
  .search-box.search-prods .finp::placeholder{color:#9aa3b2}
  .search-box.search-prods .finp:focus{border-color:#6377f6;box-shadow:0 0 0 3px rgba(99,119,246,.12)}
  .search-box.search-prods .add-btn{
    width:100%;justify-content:center;min-height:50px;margin-bottom:0;
    border-radius:14px;padding:13px 20px;
    box-shadow:0 8px 22px rgba(26,31,46,.25)
  }
  .adm-sec--prods .search-box.search-prods{margin-bottom:16px}
  .adm-sec--prods #prodGroups{padding-bottom:max(8px,env(safe-area-inset-bottom,0))}
  .adm-sec--prods .tbl-wrap.prod-grp{
    background:transparent;box-shadow:none;border:none;overflow:visible;
    margin:0 0 22px;padding:0;max-width:100%
  }
  .adm-sec--prods .prod-grp:last-child{margin-bottom:0}
  .prod-cat-hd{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:2px 2px 12px;margin-top:2px;min-width:0
  }
  .prod-cat-hd:not(:first-child){padding-top:10px;margin-top:6px}
  .prod-cat-nm{
    font-size:13.5px;font-weight:800;color:var(--dk);letter-spacing:-.02em;line-height:1.3;flex:1;min-width:0;
    word-wrap:break-word
  }
  .prod-cat-badge{
    flex-shrink:0;font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;
    background:linear-gradient(135deg,rgba(255,193,7,.32),rgba(255,193,7,.1));
    color:#3d3428;border:1px solid rgba(255,193,7,.4);box-shadow:0 1px 4px rgba(255,193,7,.15)
  }
  .tbl-prod-x{overflow-x:visible;overscroll-behavior-x:auto;margin:0;max-width:100%;width:100%}
  .tbl-prod{min-width:0;width:100%;table-layout:fixed}
  .tbl-prod thead{display:none}
  .tbl-prod tbody{display:block;width:100%}
  /* Жинақы карта: сурет | атау+баға+тақта, төмен — белсенді, әрекет (overflow: қосқыш кеспейді) */
  .tbl-prod tbody tr.prod-card{
    position:relative;display:grid;grid-template-columns:50px minmax(0,1fr);width:100%;
    grid-template-rows:auto auto auto auto auto auto;column-gap:8px;row-gap:0;
    padding:0 6px 4px;box-sizing:border-box;
    background:linear-gradient(180deg,#fff 0%,#f8f9fc 100%);
    border:1px solid rgba(23,24,38,.1);border-radius:14px;overflow:visible;
    margin:0 0 7px;
    box-shadow:0 1px 10px rgba(15,23,42,.06),0 0 0 1px rgba(255,255,255,.4) inset
  }
  .tbl-prod tbody tr.prod-card::before{
    content:'';grid-column:1/-1;grid-row:1;align-self:start;height:2px;
    background:linear-gradient(90deg,#ffb020,var(--y),#ff6b1a);
    border-radius:14px 14px 0 0;pointer-events:none
  }
  .tbl-prod tbody tr.prod-card:last-child{margin-bottom:0}
  .tbl-prod tbody tr:hover td{background:transparent}
  .tbl-prod tbody tr.prod-card > td{min-width:0!important;max-width:none!important;border:0;vertical-align:top}
  .tbl-prod tbody tr.prod-card > td::before{display:none;content:none}
  .tbl-prod tbody tr.prod-card > td{
    display:block;
    width:auto!important;
    padding:2px 0;
    font-size:12.5px
  }
  .tbl-prod tbody tr.prod-card > td:nth-child(1){
    grid-column:1;grid-row:2/5;align-self:start;padding:4px 0 2px;align-content:start
  }
  .tbl-prod tbody tr.prod-card > td:nth-child(2){
    grid-column:2;grid-row:2;padding:4px 0 0;align-self:start
  }
  .tbl-prod tbody tr.prod-card > td:nth-child(3){
    grid-column:2;grid-row:3;padding:0;margin:0;min-height:0
  }

.edit-btn,.dup-btn,.del-btn{min-width:0;padding:0;width:32px;height:32px;border-radius:9px;font-size:0;line-height:0;display:inline-flex;align-items:center;justify-content:center}

.dup-btn{background:rgba(34,197,94,.12);color:#15803d}

.dup-btn:hover{background:#16a34a;color:#fff}
.del-btn:hover{background:var(--red);color:#fff}

/* ADD/EDIT BTN */
.add-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:linear-gradient(90deg,#1a1f2e,#252b3e);color:#ffd24e;border-radius:12px;font-family:var(--font-ui);font-size:12px;font-weight:800;box-shadow:0 10px 22px rgba(15,23,42,.2);transition:.18s;margin-bottom:18px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(8,6,2,.55);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:810;background:linear-gradient(180deg,#ffffff,#fcfdff);border-radius:22px;width:min(580px,95vw);max-height:90vh;overflow-y:auto;opacity:0;pointer-events:none;transition:all .3s;box-shadow:0 24px 70px rgba(2,8,23,.25);border:1px solid #e8edf8}
.modal.on{opacity:1;pointer-events:all;transform:translate(-50%,-50%)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-ttl{font-family:var(--font-ui);font-size:16px;font-weight:800}

.modal-x:hover{background:#e2d8c4}
.modal-body{padding:22px 26px 26px;display:flex;flex-direction:column;gap:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-row.single{grid-template-columns:1fr}
label{display:block}
.lbl{font-family:var(--font-ui);font-size:10px;font-weight:800;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.finp{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--dk);background:#f9fbff;transition:.2s}
.finp:focus{border-color:#6377f6;background:#fff;box-shadow:0 0 0 3px rgba(99,119,246,.12)}
.fsel{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--dk);background:#f9fbff;appearance:none;cursor:pointer}
.fsel:focus{border-color:var(--dk)}
.ftxt{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--dk);background:#f9fbff;resize:vertical;min-height:70px;transition:.2s}
.ftxt:focus{border-color:#6377f6;background:#fff;box-shadow:0 0 0 3px rgba(99,119,246,.12)}
.ftxt.tall{min-height:clamp(240px,38vh,360px);line-height:1.45}
.img-preview{width:100%;height:120px;border-radius:var(--r);border:1.5px dashed var(--bdr);display:flex;align-items:center;justify-content:center;background:#faf8f4;overflow:hidden;position:relative}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview .noimg-txt{font-size:12px;color:var(--mut);font-weight:600;text-align:center;padding:10px}
.modal-actions{display:flex;gap:10px;padding-top:4px}
.m-cancel{flex:1;padding:13px;border-radius:var(--r);background:#f0ead8;color:var(--dk);font-family:var(--font-ui);font-size:12px;font-weight:700;transition:.18s}
.m-cancel:hover{background:#e2d8c4}
.m-save{flex:2;padding:13px;border-radius:var(--r);background:var(--dk);color:var(--y);font-family:var(--font-ui);font-size:12px;font-weight:800;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.m-save:hover{background:var(--dk2)}
.m-save:active{transform:scale(.97)}
.m-save:disabled{opacity:.5;cursor:not-allowed}

/* CONFIRM (native confirm replacement) */
.adm-confirm-bg{position:fixed;inset:0;background:rgba(8,6,2,.5);z-index:880;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
.adm-confirm-bg.on{opacity:1;pointer-events:all}
.adm-confirm{max-width:min(400px,92vw);width:100%;background:linear-gradient(180deg,#fff,#fcfdff);border-radius:20px;box-shadow:0 20px 60px rgba(2,8,23,.3);border:1px solid #e8edf8;padding:22px 22px 20px;transform:scale(.97);opacity:0;transition:transform .2s,opacity .2s}

/* SETTINGS */

.scard-acts{margin-top:10px;display:none;flex-wrap:wrap;align-items:center;gap:8px}

}

/* TOAST */
#atst{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1b24;color:var(--y);font-family:var(--font-ui);font-size:13px;font-weight:700;padding:0 20px;min-height:44px;max-width:min(400px,calc(100vw - 32px));width:max-content;border-radius:999px;box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06);opacity:0;transition:all .3s;z-index:950;pointer-events:none;text-align:center;line-height:1.25;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box}

}

.upload-wrap{position:relative;display:inline-block}

.upload-btn:hover{background:var(--blue);color:#fff}
.upload-btn.busy{background:var(--dk);color:var(--y)}

/* SEARCH + GROUPS */
.search-box{display:flex;align-items:stretch;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.search-box .finp{flex:1;min-width:min(200px,100%);max-width:100%;min-height:44px;box-sizing:border-box;padding:10px 13px;align-self:center}

.grp-head{font-family:var(--font-ui);font-size:11px;color:#5b5160;letter-spacing:.4px;text-transform:uppercase;padding:14px 10px 6px}

/* QUICK SWITCH */
.sw{--sw-w:40px;--sw-h:22px;position:relative;width:var(--sw-w);height:var(--sw-h);background:#d1d5db;border-radius:999px;cursor:pointer;transition:background .18s;display:inline-block;vertical-align:middle}
.sw.on{background:var(--grn)}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:calc(var(--sw-h) - 4px);height:calc(var(--sw-h) - 4px);border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{transform:translateX(calc(var(--sw-w) - var(--sw-h)))}
button.sw{font:inherit;color:inherit;margin:0;padding:0;border:none;-webkit-appearance:none;appearance:none;display:inline-block;text-align:left;line-height:0}
button.sw:focus-visible{outline:2px solid var(--dk);outline-offset:2px}

// Restore previous login from localStorage (7 days TTL)
async function tryAutoLogin(){
  try{
    const raw=localStorage.getItem(LS_TOKEN);
    if(!raw)return false;
    const rec=JSON.parse(raw);
    if(!rec || !rec.pw || !rec.ts)return false;
    if(Date.now()-rec.ts > 7*24*3600*1000){localStorage.removeItem(LS_TOKEN);return false}
    await loadAdminPass();
    if(rec.pw===adminPass){openAdminApp();return true}
    localStorage.removeItem(LS_TOKEN);
  }catch(e){localStorage.removeItem(LS_TOKEN)}
  return false;
}

};

// ── IMAGE UPLOAD ───────────────────────────────────────
async function uploadImg(file){
  const ext=file.name.split('.').pop();
  const name=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const {data,error}=await sb.storage.from('tokburger-images').upload(name,file,{upsert:true,contentType:file.type});
  if(error)throw error;
  const {data:pub}=sb.storage.from('tokburger-images').getPublicUrl(name);
  return pub.publicUrl;
}

// simulated progress (Supabase JS client does not expose native upload progress events)
async function uploadWithProgress(file,btnEl){
  if(!btnEl){return await uploadImg(file)}
  const original=btnEl.innerHTML;
  btnEl.classList.add('busy');
  let p=5;
  btnEl.innerHTML=T('upl5');
  const tmr=setInterval(()=>{p=Math.min(p+7,90);btnEl.innerHTML=T('uplPctPrefix')+p+T('uplPct')},180);
  try{
    const url=await uploadImg(file);
    clearInterval(tmr);
    btnEl.innerHTML=T('upl100');
    setTimeout(()=>{btnEl.innerHTML=original;btnEl.classList.remove('busy')},350);
    return url;
  }catch(err){
    clearInterval(tmr);
    btnEl.innerHTML=original;btnEl.classList.remove('busy');
    throw err;
  }
}

// ══════════════════════════════════════════════════════
//  AUTO TRANSLATE (MyMemory — free, no key)
// ══════════════════════════════════════════════════════
const trCache=new Map();
async function tr(text,to){
  const src=(text||'').trim();
  if(!src)return '';
  const key=src+'::'+to;
  if(trCache.has(key))return trCache.get(key);
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(src)}&langpair=kk|${to}`);
    const j=await r.json();
    const out=(j && j.responseData && j.responseData.translatedText) ? j.responseData.translatedText : src;
    trCache.set(key,out);
    return out;
  }catch(e){
    return src;
  }
}
// KK → только RU (EN на сайте не используется)
async function trTriple(kk){
  if(!kk||!kk.trim())return {ru:'',en:''};
  const ru=await tr(kk,'ru');
  return {ru,en:''};
}
// Pre-fill helper: KK → поле RU
async function translateFields(kkVal,targets){
  if(!kkVal||!kkVal.trim())return;
  const {ru}=await trTriple(kkVal);
  if(targets.ru&&$(targets.ru))$(targets.ru).value=ru;
}

function settingsBanLtnEnabled(raw){
  if(raw===undefined||raw===null)return true;
  if(raw===false||raw===0)return false;
  if(raw===true||raw===1)return true;
  let v=String(raw).trim().replace(/^\ufeff/,'').replace(/[\u200B-\u200D\uFEFF]/g,'');
  if(v.length>=2&&((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'"))))
    v=v.slice(1,-1).trim();
  const vl=v.toLowerCase();
  if(['','0','false','no','off','n','disable','disabled','выкл','выключено','жоқ'].includes(vl))return false;
  if(['1','true','yes','y','on','enable','enabled','да','вкл','включено','қосу','қосылған'].includes(vl))return true;
  const n=parseFloat(vl.replace(',', '.'));
  if(Number.isFinite(n)&&n===0)return false;
  if(Number.isFinite(n)&&n>0)return true;
  return true;
}

const _setSnap={};
function setActs(actsId,dirty){const a=$(actsId);if(a)a.classList.toggle('on',!!dirty)}
function initSettingsDirty(){
  const bindField=(inputId,actsId,key)=>{
    const inp=$(inputId);if(!inp)return;
    _setSnap[inputId]=inp.value;
    const upd=()=>setActs(actsId,inp.value!==_setSnap[inputId]);
    ['input','change'].forEach(ev=>inp.addEventListener(ev,upd));
    const box=$(actsId);if(!box)return;
    box.querySelector('.discard-btn').addEventListener('click',()=>{inp.value=_setSnap[inputId];setActs(actsId,false)});
    box.querySelector('.save-btn').addEventListener('click',async()=>{
      if(await saveSetting(key,inputId)){_setSnap[inputId]=inp.value;setActs(actsId,false)}
    });
    setActs(actsId,false);
  };
  bindField('sWa','actsWa','whatsapp_number');
  bindField('sInsta','actsInsta','instagram_url');
  bindField('sPromoVid','actsPromoVid','promo_video_url');
  bindField('sPhone','actsPhone','phone');
  bindField('sHours','actsHours','working_hours');
  const cta=$('sCities'),cbox=$('actsCities');
  if(cta&&cbox){
    _setSnap.sCities=cta.value;
    const updC=()=>setActs('actsCities',cta.value!==_setSnap.sCities);
    ['input','change'].forEach(ev=>cta.addEventListener(ev,updC));
    cbox.querySelector('.discard-btn').addEventListener('click',()=>{cta.value=_setSnap.sCities;setActs('actsCities',false)});
    cbox.querySelector('.save-btn').addEventListener('click',async()=>{if(await saveCities()){_setSnap.sCities=cta.value;setActs('actsCities',false)}});
    setActs('actsCities',false);
  }
  bindField('sPw','actsPw','admin_password');
  const banChk=$('banLtnChk'),banFace=$('banLtnFace');
  if(banChk&&banFace){
    let banLtnSaving=false;
    banChk.addEventListener('change',async()=>{
      if(banLtnSaving)return;
      banLtnSaving=true;
      const next=banChk.checked;
      banFace.classList.toggle('on',next);
      banChk.setAttribute('aria-checked',next?'true':'false');
      try{
        const val=next?'1':'0';
        const {error}=await sb.from('tokburger_settings').upsert({key:'banner_lightning',value:val,updated_at:new Date().toISOString()},{onConflict:'key'});
        if(error){
          banChk.checked=!next;
          banFace.classList.toggle('on',!next);
          banChk.setAttribute('aria-checked',(!next)?'true':'false');
          toast(T('err')+error.message,false);
          return;
        }
        toast(next?T('tglOn'):T('tglOff'));
      }finally{
        banLtnSaving=false;
      }
    });
  }
}

function isValidWaTpl(s){
  if(!s||typeof s!=='string')return false;
  const t=String(s).replace(/^\uFEFF/,'').trim();
  if(!/#cart\b/.test(t)||!/#time\b/.test(t)||!/#(?:sum|price)\b/.test(t))return false;
  if(/corzine|#\s*include|include\s*\/\/\s*timestamp|#\s*\/\//i.test(t))return false;
  if(/\(sum\)|\(#\s*include/i.test(t))return false;
  if(/Для\s+собаки/i.test(t))return false;
  return true;
}

  for(const [lang,template] of Object.entries(waTpls)){
    if(!template)continue;
    const {error}=await sb.from('tokburger_wa_templates').upsert({lang,template,updated_at:new Date().toISOString()},{onConflict:'lang'});
    if(error){toast(T('err')+lang+': '+error.message,false);ok=false}
  }
  if(ok)toast(T('saved'));
  return ok
}

// ── INIT ───────────────────────────────────────────────
(async () => {
  const logged = await tryAutoLogin();
  if(!logged){ await loadAdminPass(); }
})();
</script>
